sources:
  arxiv:
    enabled: true
    max_results: 10
    timeout_seconds: 20
  
  openalex:
    enabled: true
    max_results: 10
    timeout_seconds: 20
  
  crossref:
    enabled: true
    max_results: 10
    timeout_seconds: 20
  
  semantic_scholar:
    enabled: true
    timeout_seconds: 20
  
  google_scholar:
    enabled: false
    
  scopus:
    enabled: false
  
  news_rss:
    enabled: true
    max_results: 10
    timeout_seconds: 20
    hl: "en-US"
    gl: "US"
    ceid: "US:en"
    window_days: 7

  linkedin_import:
    enabled: false
    import_dir: "imports/linkedin"

  linkedin_posts:
    enabled: false
    timeout_seconds: 20
    max_results: 10
    linkedin_version: "202601"
    access_token_env: "LINKEDIN_ACCESS_TOKEN"
    organization_urns:
      - "urn:li:organization:123456"
    person_urns: []
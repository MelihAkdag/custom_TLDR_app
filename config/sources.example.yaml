      - url: "https://gcaptain.com/feed/"
        source_name: "gCaptain"
      - url: "https://www.marinelink.com/news/rss"
        source_name: "Marine Link"
      - url: "https://lloydslist.maritimeintelligence.informa.com/rss/all"
        source_name: "Lloyd's List"
      - url: "https://www.tradewindsnews.com/rss/all"
        source_name: "TradeWinds"
      - url: "https://news.google.com/rss/search?q=site:imo.org+when:7d"
        source_name: "IMO"
      - url: "https://news.google.com/rss/search?q=site:emsa.europa.eu+when:7d"
        source_name: "EMSA"
      - url: "https://news.google.com/rss/search?q=site:sdir.no+when:7d"

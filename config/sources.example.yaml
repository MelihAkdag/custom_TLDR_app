sources:
  arxiv:
    enabled: true
    max_results: 5
    timeout_seconds: 20
  
  openalex:
    enabled: true
    max_results: 5
    timeout_seconds: 20
  
  crossref:
    enabled: true
    max_results: 5
    timeout_seconds: 20
  
  semantic_scholar:
    enabled: true
    timeout_seconds: 20
  
  news_rss:
    enabled: true
    max_results: 10
    timeout_seconds: 20
